services:
  backend:
    build:
      context: ./backend
    container_name: wedding-seating-backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - wedding_data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/dev.db
    command: sh -c "npx prisma migrate deploy && npm run dev"

  frontend:
    build:
      context: ./frontend
    container_name: wedding-seating-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000
    command: npm run dev
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
  wedding_data:
